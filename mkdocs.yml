site_name: CMakeless
site_description: Write C++ builds in Python, get clean CMakeLists.txt.
site_url: https://bbalouki.github.io/cmakeless/
repo_url: https://github.com/bbalouki/cmakeless
repo_name: bbalouki/cmakeless
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

nav:
  - Home:
      - index.md
      - Introduction: INTRODUCTION.md
      - Architecture: ARCHITECTURE.md
      - Tutorial: tutorial.md
      - Cookbook: cookbook.md
      - Features: FEATURES.md
      - Migration Guide: migration.md
      - Roadmap: ROADMAP.md
      - Benchmarks: benchmarks.md
  - API Reference: reference/
  - Contributing: contributing.md
  - Code of Conduct: code_of_conduct.md
  - Security: security.md
  - Changelog: changelog.md

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
        - scripts/gen_community_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          inventories:
            - https://docs.python.org/3/objects.inv
          options:
            docstring_style: google
            docstring_section_style: table
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true
