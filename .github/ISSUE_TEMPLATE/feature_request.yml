name: Feature Request
description: Propose a new capability or a change to CMakeless's public API.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        CMakeless's first rule is that every public API surface must earn
        its place: "does this make the common case simpler?" (see
        [CONTRIBUTING.md](https://github.com/bbalouki/cmakeless/blob/main/CONTRIBUTING.md)).
        Framing your request around the CMake pain it removes helps a lot.

  - type: textarea
    id: problem
    attributes:
      label: What CMake pain is this solving?
      description: Describe the real scenario, ideally with the raw CMake you'd otherwise have to write.
    validations:
      required: true

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed cmakelessfile.py API
      description: Sketch the Python API you'd want to write, even if rough.
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this (including "do nothing" or "use raw_cmake()") and why they fall short.

  - type: dropdown
    id: willing-to-contribute
    attributes:
      label: Would you be willing to work on this?
      options:
        - "Yes, I'd like to submit a PR"
        - "Maybe, with some guidance"
        - "No, just proposing the idea"
    validations:
      required: false
