name: Benchmarks

# Not a per-PR gate: these numbers are published in docs/benchmarks.md, not
# enforced as a pass/fail check. Runs automatically on main when the parallel
# paths themselves change (dependency resolution, multi-preset configure),
# and can also be triggered manually at any time. The publish-results job
# opens a PR with any `_to fill_` cells it can resolve from this run's
# matrix results; review and merge it.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/cmakeless/_parallel.py"
      - "src/cmakeless/api/project.py"
      - "benchmarks/bench_resolution.py"
      - "benchmarks/bench_presets.py"

jobs:
  bench:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # The "t" suffix selects the free-threaded (PEP 703) build; the
        # plain version is the standard GIL build for comparison. 3.14t is
        # the project's stated free-threaded target (non-experimental as
        # of 3.14, see docs/ARCHITECTURE.md).
        python-version: ["3.13", "3.14t"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install package with dev dependencies
        run: uv pip install -e ".[dev]"

      - name: Run resolution benchmark
        shell: bash
        run: |
          echo '### Resolution: ${{ matrix.os }} / py${{ matrix.python-version }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run python benchmarks/bench_resolution.py --json "resolution__${{ matrix.os }}__${{ matrix.python-version }}.json" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run multi-preset configure benchmark
        shell: bash
        run: |
          echo '### Multi-preset configure: ${{ matrix.os }} / py${{ matrix.python-version }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run python benchmarks/bench_presets.py --json "presets__${{ matrix.os }}__${{ matrix.python-version }}.json" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload result JSON
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: "*.json"

  publish-results:
    name: Refresh docs/benchmarks.md
    needs: bench
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: bench-results-*
          path: artifacts
          merge-multiple: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Update benchmark table
        run: uv run python benchmarks/update_benchmarks_table.py artifacts/

      - name: Open PR with refreshed numbers
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: refresh benchmark numbers"
          title: "docs: refresh benchmark numbers"
          branch: bench-results-update
          add-paths: docs/benchmarks.md
