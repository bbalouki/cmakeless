name: Benchmarks

# Manual, not a per-PR gate: these numbers are published in
# docs/benchmarks.md, not enforced as a pass/fail check. Run this after a
# change to the parallel paths (dependency resolution, multi-preset
# configure) and copy the job summary's numbers into docs/benchmarks.md.
on:
  workflow_dispatch: {}

jobs:
  bench:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # The "t" suffix selects the free-threaded (PEP 703) build; the
        # plain version is the standard GIL build for comparison. 3.14t is
        # the project's stated free-threaded target (non-experimental as
        # of 3.14, see docs/ARCHITECTURE.md).
        python-version: ["3.13", "3.14t"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install package with dev dependencies
        run: uv pip install -e ".[dev]"

      - name: Run resolution benchmark
        shell: bash
        run: |
          echo '### Resolution: ${{ matrix.os }} / py${{ matrix.python-version }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run python benchmarks/bench_resolution.py >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run multi-preset configure benchmark
        shell: bash
        run: |
          echo '### Multi-preset configure: ${{ matrix.os }} / py${{ matrix.python-version }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run python benchmarks/bench_presets.py >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
